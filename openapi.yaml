openapi: 3.0.1
info:
  title: BookServiceNextDoor API
  version: '1.0.0'
  description: Minimal OpenAPI spec for slots, bookings, and availability endpoints.
servers:
  - url: http://localhost:5050/api/v1
paths:
  /slots:
    get:
      summary: Get available slots for a business service on a date
      parameters:
        - in: query
          name: businessId
          required: true
          schema:
            type: string
        - in: query
          name: serviceId
          required: true
          schema:
            type: string
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of available slots
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: string
                          format: date-time
                        end:
                          type: string
                          format: date-time

  /bookings:
    post:
      summary: Create a booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, serviceId, slot]
              properties:
                businessId:
                  type: string
                serviceId:
                  type: string
                slot:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
                location:
                  type: object
      responses:
        '201':
          description: Booking created
        '400':
          description: Bad request
  /availability:
    post:
      summary: Create or update business availability (protected)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                businessId:
                  type: string
                serviceId:
                  type: string
                timezone:
                  type: string
                slotDuration:
                  type: integer
                workingHours:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Availability saved

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
